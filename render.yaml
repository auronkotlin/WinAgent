services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        scope: build
      - key: DEEPSEEK_API_KEY
        scope: build
      - key: TELEGRAM_BOT_TOKEN
        scope: build
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
